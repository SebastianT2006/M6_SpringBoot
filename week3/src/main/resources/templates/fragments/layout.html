<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Fragmento: <head> con CSS -->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | Eventify Admin'">Eventify Admin</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .card-header { background-color: #0d6efd; color: white; }
        .empty-state { text-align: center; padding: 3rem; color: #6c757d; }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; }
    </style>
</head>

<!-- Fragmento: barra de navegación -->
<nav th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/admin/events">
            <i class="bi bi-calendar-event"></i> Eventify
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/events">
                        <i class="bi bi-calendar3"></i> Eventos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/venues">
                        <i class="bi bi-building"></i> Lugares
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/swagger-ui.html" target="_blank">
                        <i class="bi bi-code-slash"></i> API Docs
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Fragmento: pie de página -->
<footer th:fragment="footer" class="text-center text-muted py-4 mt-5 border-top">
    <small>Eventify &copy; 2024 — Panel Administrativo</small>
</footer>

</html>
