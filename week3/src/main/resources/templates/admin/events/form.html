<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/layout :: head('Nuevo Evento')}"></head>

<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/events">Eventos</a></li>
            <li class="breadcrumb-item active">Nuevo Evento</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header">
                    <i class="bi bi-plus-circle"></i> Registrar Nuevo Evento
                </div>
                <div class="card-body">
                    <!--
                        th:action  → URL del POST en el controller de vista.
                        th:object  → vincula el objeto Event al formulario.
                    -->
                    <form th:action="@{/admin/events/save}"
                          th:object="${event}"
                          method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Nombre</label>
                            <!-- th:field="*{name}" → enlaza el campo name del objeto -->
                            <input type="text" id="name" th:field="*{name}"
                                   class="form-control"
                                   placeholder="Ej: Concierto de Jazz" required/>
                        </div>

                        <div class="mb-3">
                            <label for="date" class="form-label fw-semibold">Fecha (YYYY-MM-DD)</label>
                            <input type="date" id="date" th:field="*{date}"
                                   class="form-control" required/>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-semibold">Descripción</label>
                            <textarea id="description" th:field="*{description}"
                                      class="form-control" rows="3"
                                      placeholder="Describe el evento..." required></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <!--
                                ESCENARIO 3 — Al hacer clic en "Guardar":
                                el POST va al controller → createEvent() → redirect:/admin/events
                            -->
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Guardar Evento
                            </button>
                            <a href="/admin/events" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
