<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/layout :: head('Catálogo de Eventos')}"></head>

<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            <i class="bi bi-calendar3 text-primary"></i> Catálogo de Eventos
        </h2>
        <a href="/admin/events/new" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nuevo Evento
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-header d-flex align-items-center gap-2">
            <i class="bi bi-table"></i> Listado de Eventos
        </div>
        <div class="card-body p-0">

            <!--
                ESCENARIO 2 — Catálogo vacío:
                th:if muestra mensaje amigable cuando la lista está vacía.
            -->
            <div th:if="${#lists.isEmpty(events)}" class="empty-state">
                <i class="bi bi-calendar-x text-secondary"></i>
                <h5>Actualmente no hay eventos programados</h5>
                <p class="text-muted">Comienza agregando el primer evento.</p>
                <a href="/admin/events/new" class="btn btn-outline-primary mt-2">
                    <i class="bi bi-plus"></i> Registrar primer evento
                </a>
            </div>

            <!--
                ESCENARIO 1 — Camino feliz:
                th:unless muestra la tabla cuando hay datos.
                th:each itera la lista "events" inyectada en el Model.
                th:text renderiza cada campo del objeto Event.
            -->
            <table th:unless="${#lists.isEmpty(events)}"
                   class="table table-hover table-bordered mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Fecha</th>
                        <th>Descripción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event : ${events}">
                        <td th:text="${event.id}"></td>
                        <td><strong th:text="${event.name}"></strong></td>
                        <td>
                            <span class="badge bg-info text-dark"
                                  th:text="${event.date}"></span>
                        </td>
                        <td th:text="${event.description}"></td>
                    </tr>
                </tbody>
                <tfoot class="table-light">
                    <tr>
                        <td colspan="4" class="text-muted small">
                            Total: <strong th:text="${#lists.size(events)}"></strong> evento(s)
                        </td>
                    </tr>
                </tfoot>
            </table>

        </div>
    </div>

    <div class="mt-3 text-end">
        <a href="/admin/venues" class="text-muted small">
            <i class="bi bi-building"></i> Ver Gestión de Lugares →
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
