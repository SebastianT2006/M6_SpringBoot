<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/layout :: head('Gestión de Lugares')}"></head>

<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            <i class="bi bi-building text-primary"></i> Gestión de Lugares
        </h2>
        <a href="/admin/venues/new" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nuevo Lugar
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-header d-flex align-items-center gap-2">
            <i class="bi bi-table"></i> Listado de Lugares
        </div>
        <div class="card-body p-0">

            <!-- th:if → catálogo vacío -->
            <div th:if="${#lists.isEmpty(venues)}" class="empty-state">
                <i class="bi bi-building-x text-secondary"></i>
                <h5>Actualmente no hay lugares registrados</h5>
                <p class="text-muted">Agrega el primer lugar para asociarlo con eventos.</p>
                <a href="/admin/venues/new" class="btn btn-outline-primary mt-2">
                    <i class="bi bi-plus"></i> Registrar primer lugar
                </a>
            </div>

            <!-- th:unless → tabla con datos -->
            <table th:unless="${#lists.isEmpty(venues)}"
                   class="table table-hover table-bordered mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Dirección</th>
                        <th class="text-center">Capacidad</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="venue : ${venues}">
                        <td th:text="${venue.id}"></td>
                        <td><strong th:text="${venue.name}"></strong></td>
                        <td th:text="${venue.address}"></td>
                        <td class="text-center">
                            <span class="badge bg-success"
                                  th:text="${venue.capacity} + ' personas'"></span>
                        </td>
                    </tr>
                </tbody>
                <tfoot class="table-light">
                    <tr>
                        <td colspan="4" class="text-muted small">
                            Total: <strong th:text="${#lists.size(venues)}"></strong> lugar(es)
                        </td>
                    </tr>
                </tfoot>
            </table>

        </div>
    </div>

    <div class="mt-3 text-end">
        <a href="/admin/events" class="text-muted small">
            <i class="bi bi-calendar3"></i> Ver Catálogo de Eventos →
        </a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
