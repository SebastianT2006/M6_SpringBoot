spring.application.name=eventify

# ── H2 (persistente en archivo para sobrevivir reinicios) ──────────────────────
spring.datasource.url=jdbc:h2:file:./data/eventifydb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Consola H2 (solo desarrollo) ─────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Swagger (documenta SOLO rutas /api/**) ───────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.paths-to-exclude=/admin/**
